<html lang="en">
<head>
    <title>Student Planner Hub :: Contact</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="styles.css" rel="stylesheet">
</head>
<body>

<div id="wrapper">

    <header>
        <h1>Student Planner Hub</h1>
        <p>Stay organized. Study smarter. Plan ahead.</p>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="assignments.html">Assignments</a></li>
            <li><a href="studytools.html">Study Tools</a></li>

    <main>
        <section class="hero">
            <h2>Contact</h2>
            <p>If you have questions or feedback, fill out the form below.</p>
        </section>

        <section class="form-section">
            <form action="#" method="post">
                <label for="myName">Name:</label>
                <input type="text" name="myName" id="myName">

                <label for="myEmail">Email:</label>
                <input type="email" name="myEmail" id="myEmail">

                <label for="myMessage">Message:</label>
                <textarea name="myMessage" id="myMessage" rows="5" cols="30"></textarea>

                <input type="submit" value="Send">
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Student Planner Hub</p>
    </footer>
